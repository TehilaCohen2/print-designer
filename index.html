<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרינטאצ׳ — עורך תמונות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;700&family=Amatic+SC:wght@400;700&family=Secular+One&family=Suez+One&family=Karantina:wght@400;700&family=Fredoka:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f6f1;--surface:#fff;--primary:#2ab090;--primary-hover:#239b7d;
  --accent:#e8446d;--text:#1a1a2e;--text-light:#6b7280;--border:#e5e7eb;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--surface);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.logo{font-size:26px;font-weight:900;color:var(--primary);letter-spacing:-1px}.logo span{color:var(--accent)}
.header-actions{display:flex;gap:10px}

.btn{padding:9px 20px;border-radius:8px;border:none;font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{opacity:.9}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:transparent;color:var(--text-light);padding:6px 12px;font-size:13px}.btn-ghost:hover{color:var(--primary)}

.app-layout{display:grid;grid-template-columns:280px 1fr 250px;min-height:calc(100vh - 60px)}

/* Sidebar */
.sidebar{background:var(--surface);border-left:1px solid var(--border);padding:20px 16px;overflow-y:auto;max-height:calc(100vh - 60px)}
.sidebar-section{margin-bottom:22px}
.sidebar-title{font-size:13px;font-weight:700;color:var(--text-light);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* Products */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.product-option{padding:10px 6px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;background:var(--bg)}
.product-option:hover{border-color:var(--primary);transform:scale(1.03)}
.product-option.active{border-color:var(--primary);border-width:3px;background:rgba(42,176,144,.05)}
.product-icon{font-size:30px;margin-bottom:2px}
.product-label{font-size:12px;font-weight:600}

/* Frame categories */
.frame-categories{display:flex;flex-direction:column;gap:6px}
.frame-cat-btn{padding:10px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:right;transition:all .2s;background:var(--bg);font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.frame-cat-btn:hover{border-color:var(--primary)}
.frame-cat-btn.active{border-color:var(--primary);background:rgba(42,176,144,.05)}
.frame-cat-btn .cat-icon{font-size:20px}
.frame-cat-btn .cat-arrow{margin-right:auto;transition:transform .2s;font-size:12px;color:var(--text-light)}
.frame-cat-btn.active .cat-arrow{transform:rotate(90deg)}

.frames-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;padding:10px;background:var(--bg);border-radius:10px}
.frames-grid.collapsed{display:none}
.frame-option{aspect-ratio:1;border:2px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;overflow:hidden;background:var(--surface)}
.frame-option:hover{border-color:var(--primary);transform:scale(1.05);box-shadow:0 3px 12px rgba(42,176,144,.15)}
.frame-option.active{border-color:var(--primary);border-width:3px}
.frame-option svg{width:85%;height:85%}

/* Text controls */
.text-controls{display:flex;flex-direction:column;gap:8px}
.input-group{display:flex;flex-direction:column;gap:3px}
.input-group label{font-size:12px;color:var(--text-light);font-weight:500}
.input-group input,.input-group select{padding:9px 10px;border:2px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:14px}
.input-group input:focus{outline:none;border-color:var(--primary)}
.color-size-row{display:flex;gap:8px}.color-size-row .input-group{flex:1}
input[type="color"]{width:100%;height:38px;border:2px solid var(--border);border-radius:8px;cursor:pointer;padding:2px}

/* Font list */
.font-list{max-height:180px;overflow-y:auto;border:2px solid var(--border);border-radius:10px;background:var(--surface)}
.font-option{padding:8px 10px;cursor:pointer;border-radius:0;transition:background .15s;font-size:18px;border-bottom:1px solid var(--border)}
.font-option:last-child{border-bottom:none}
.font-option:hover{background:rgba(42,176,144,.08)}
.font-option.active{background:rgba(42,176,144,.15)}

/* Canvas area */
.canvas-area{display:flex;flex-direction:column;align-items:center;padding:24px 20px}
.canvas-wrapper{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:20px}
.toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

/* Preview panel */
.preview-panel{background:var(--surface);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;align-items:center;overflow-y:auto;max-height:calc(100vh - 60px)}
.preview-title{font-size:13px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;align-self:stretch}
.mockup-container{width:100%;display:flex;align-items:center;justify-content:center;flex:1;min-height:300px}
.mockup-placeholder{color:var(--text-light);font-size:13px;text-align:center}
.product-name-preview{margin-top:16px;font-size:16px;font-weight:700;color:var(--text);text-align:center}

/* Mockups */
.mug-wrap{display:flex;flex-direction:column;align-items:center}
.mug-top{width:150px;height:12px;background:linear-gradient(180deg,#fff,#e0e0e0);border-radius:8px 8px 0 0;border:2px solid #ccc;border-bottom:none}
.mug-body{width:140px;height:160px;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);border-radius:0 0 10px 10px;position:relative;border:2px solid #ccc;overflow:hidden}
.mug-handle{position:absolute;left:-24px;top:25px;width:24px;height:70px;border:4px solid #ccc;border-right:none;border-radius:16px 0 0 16px}
.mug-img-area{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:110px;height:110px;border-radius:3px;overflow:hidden;background:#f0f0f0}
.mug-img-area img{width:100%;height:100%;object-fit:cover}

.keychain-wrap{display:flex;flex-direction:column;align-items:center}
.kc-ring{width:28px;height:28px;border:4px solid #999;border-radius:50%;margin-bottom:-5px;z-index:1}
.kc-plate{width:100px;height:100px;background:linear-gradient(135deg,#f5f5f5,#ddd);border-radius:10px;border:2px solid #bbb;overflow:hidden}
.kc-plate img{width:100%;height:100%;object-fit:cover}

.bottle-wrap{display:flex;flex-direction:column;align-items:center}
.bt-cap{width:36px;height:18px;background:linear-gradient(180deg,#555,#333);border-radius:5px 5px 0 0}
.bt-neck{width:32px;height:22px;background:linear-gradient(135deg,#e8e8e8,#ccc);border:1px solid #bbb}
.bt-body{width:90px;height:180px;background:linear-gradient(135deg,#f5f5f5,#ddd);border-radius:0 0 14px 14px;border:2px solid #bbb;overflow:hidden;position:relative}
.bt-img-area{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:70px;height:90px;overflow:hidden;border-radius:3px}
.bt-img-area img{width:100%;height:100%;object-fit:cover}

.canvas-mock-wrap{position:relative}
.cm-frame{width:180px;height:140px;background:#fff;border:8px solid #2a2a2a;box-shadow:4px 4px 16px rgba(0,0,0,.2);overflow:hidden}
.cm-frame img{width:100%;height:100%;object-fit:cover}
.cm-shadow{margin-top:6px;width:80%;height:6px;background:rgba(0,0,0,.08);border-radius:50%;filter:blur(3px);margin-left:10%}

/* Thumbnails */
.thumbnails-strip{display:flex;gap:8px;margin-top:16px;padding:10px 14px;background:var(--surface);border-radius:10px;box-shadow:var(--shadow);overflow-x:auto}
.thumb{width:56px;height:56px;border-radius:8px;border:2px solid var(--border);overflow:hidden;cursor:pointer;flex-shrink:0;transition:all .2s;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb.active{border-color:var(--primary);border-width:3px;box-shadow:0 0 0 3px rgba(42,176,144,.2)}
.thumb .rm{position:absolute;top:1px;left:1px;width:16px;height:16px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.thumb:hover .rm{display:flex}
.add-thumb{width:56px;height:56px;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:22px;color:var(--text-light)}
.add-thumb:hover{border-color:var(--primary);color:var(--primary)}

/* Upload */
.upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:40px;text-align:center}
.upload-zone{width:480px;max-width:90vw;padding:50px 36px;border:3px dashed var(--border);border-radius:20px;background:var(--surface);cursor:pointer;transition:all .3s}
.upload-zone:hover{border-color:var(--primary);background:rgba(42,176,144,.02);transform:translateY(-2px)}
.upload-icon{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),#34d5a8);border-radius:50%;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:32px;height:32px;fill:#fff}
.upload-zone h2{font-size:22px;font-weight:700;margin-bottom:6px}
.upload-zone p{color:var(--text-light);font-size:14px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;transition:transform .3s;z-index:1000}
.toast.show{transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}

/* Applied frame indicator */
.frame-applied-msg{margin-top:6px;padding:6px 12px;background:rgba(42,176,144,.1);border-radius:8px;font-size:12px;color:var(--primary);text-align:center;font-weight:500}
</style>
</head>

<div class="upload-screen" id="uploadScreen">

<div class="app-layout hidden" id="editorLayout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">בחר מוצר</div>
      <div class="product-grid" id="productGrid"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">מסגרות</div>
      <div class="frame-categories" id="frameCats"></div>
      <div id="framesContainer"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">כיתוב</div>
      <div class="text-controls">
        <div class="input-group">
          <label>טקסט</label>
          <input type="text" id="textInput" placeholder="הקלידו כיתוב..." dir="rtl">

        </div>

        </div>

// ══════════ INIT ══════════
function initEditor(){
  canvas=new fabric.Canvas('fabricCanvas',{width:CW,height:CH,backgroundColor:'#f0f0f0',preserveObjectStacking:true});

  // Products
  const pg=document.getElementById('productGrid');
  PRODUCTS.forEach(p=>{
    const d=document.createElement('div');
    d.className='product-option';d.dataset.id=p.id;
    d.innerHTML=`<div class="product-icon">${p.icon}</div><div class="product-label">${p.label}</div>`;
    d.onclick=()=>selectProduct(p.id);
    pg.appendChild(d);
  });

  // Frame categories
  const fc=document.getElementById('frameCats');
  FRAME_CATS.forEach(cat=>{
    const btn=document.createElement('div');
    btn.className='frame-cat-btn';btn.dataset.id=cat.id;
    btn.innerHTML=`<span class="cat-icon">${cat.icon}</span>${cat.label}<span class="cat-arrow">◀</span>`;
    btn.onclick=()=>openFrameCat(cat.id);
    fc.appendChild(btn);
  });

  // Fonts
  const fl=document.getElementById('fontList');
  FONTS.forEach(f=>{
    const d=document.createElement('div');
    d.className='font-option'+(f.family===selFont?' active':'');
    d.style.fontFamily=`'${f.family}', sans-serif`;
    d.textContent=f.label;
    d.onclick=()=>{selFont=f.family;document.querySelectorAll('.font-option').forEach(x=>x.classList.remove('active'));d.classList.add('active')};
    fl.appendChild(d);
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    if((e.key==='Delete'||e.key==='Backspace')&&document.activeElement.tagName!=='INPUT'){
      const o=canvas.getActiveObject();
      if(o&&o.name==='caption'){canvas.remove(o);canvas.renderAll()}
    }
  });
}

// ══════════ PRODUCTS ══════════
function selectProduct(id){
  selProduct=id;
  document.querySelectorAll('.product-option').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.getElementById('productNamePreview').textContent=PRODUCTS.find(p=>p.id===id).label;
  refreshMockup();
}

function refreshMockup(){
  const mc=document.getElementById('mockupContainer');
  if(!selProduct||!canvas){mc.innerHTML='<div class="mockup-placeholder">בחרו מוצר כדי לראות הדמיה</div>';return}
  canvas.discardActiveObject();
  canvas.renderAll();
  // Small delay to ensure render is complete
  setTimeout(()=>{
    const snap=canvas.toDataURL({format:'png',multiplier:0.4});
    const img=`<img src="${snap}" style="width:100%;height:100%;object-fit:cover">`;
    if(selProduct==='mug'){
      mc.innerHTML=`<div class="mug-wrap"><div class="mug-top"></div><div class="mug-body"><div class="mug-handle"></div><div class="mug-img-area">${img}</div></div></div>`;
    }else if(selProduct==='keychain'){
      mc.innerHTML=`<div class="keychain-wrap"><div class="kc-ring"></div><div class="kc-plate">${img}</div></div>`;
    }else if(selProduct==='bottle'){
      mc.innerHTML=`<div class="bottle-wrap"><div class="bt-cap"></div><div class="bt-neck"></div><div class="bt-body"><div class="bt-img-area">${img}</div></div></div>`;
    }else if(selProduct==='canvas'){
      mc.innerHTML=`<div class="canvas-mock-wrap"><div class="cm-frame">${img}</div><div class="cm-shadow"></div></div>`;
    }
  },50);
}

// ══════════ FRAMES ══════════
function openFrameCat(catId){
  const container=document.getElementById('framesContainer');
  const btns=document.querySelectorAll('.frame-cat-btn');

  // If clicking same category, close it
  if(activeCat===catId){
    activeCat=null;
    container.innerHTML='';
    btns.forEach(b=>b.classList.remove('active'));
    return;
  }

  activeCat=catId;
  btns.forEach(b=>b.classList.toggle('active',b.dataset.id===catId));

  const cat=FRAME_CATS.find(c=>c.id===catId);
  let html='<div class="frames-grid">';
  cat.frames.forEach(f=>{
    html+=`<div class="frame-option${curFrameId===f.id?' active':''}" data-fid="${f.id}" onclick="applyFrameById('${f.id}')">${f.svg}</div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

function findFrameById(fid){
  for(const cat of FRAME_CATS){
    const f=cat.frames.find(fr=>fr.id===fid);
    if(f) return f;
  }
  return null;
}

function applyFrameById(fid){
  const frameDef=findFrameById(fid);
  if(!frameDef) return;

  // Get photo
  const photo=canvas.getObjects().find(o=>o.name==='photo');
  if(!photo){showToast('העלו תמונה קודם');return}

  // Remove old frame objects
  const toRemove=canvas.getObjects().filter(o=>o.name&&o.name.startsWith('frame'));
  toRemove.forEach(o=>canvas.remove(o));

  // Update UI
  curFrameId=fid;
  document.querySelectorAll('.frame-option').forEach(x=>x.classList.toggle('active',x.dataset.fid===fid));

  // "No frame" option
  if(!frameDef.color){
    canvas.renderAll();
    showToast('המסגרת הוסרה');
    refreshMockup();
    return;
  }

  // Calculate photo bounds
  const pw=photo.width*photo.scaleX;
  const ph=photo.height*photo.scaleY;
  let pl, pt;
  if(photo.originX==='center'){
    pl=photo.left - pw/2;
    pt=photo.top - ph/2;
  } else {
    pl=photo.left;
    pt=photo.top;
  }

  const B=30; // border thickness
  const r=frameDef.radius||4;

  // Outer frame rect
  const outer=new fabric.Rect({
    left: pl - B,
    top: pt - B,
    width: pw + B*2,
    height: ph + B*2,
    fill: frameDef.color,
    stroke: frameDef.border,
    strokeWidth: 3,
    rx: r, ry: r,
    selectable: false,
    evented: false,
    name: 'frame-outer'
  });

  // Inner border line
  const inner=new fabric.Rect({
    left: pl - B + 7,
    top: pt - B + 7,
    width: pw + (B-7)*2,
    height: ph + (B-7)*2,
    fill: 'transparent',
    stroke: frameDef.border,
    strokeWidth: 1,
    rx: Math.max(1,r-3), ry: Math.max(1,r-3),
    selectable: false,
    evented: false,
    name: 'frame-inner'
  });

  // Add to canvas — BEHIND the photo
  canvas.add(outer);
  canvas.add(inner);
  canvas.sendToBack(inner);
  canvas.sendToBack(outer);
  canvas.renderAll();

  showToast('✓ המסגרת הוחלה על התמונה');
  refreshMockup();
}

// ══════════ TEXT ══════════
function addText(){
  const val=document.getElementById('textInput').value.trim();
  if(!val){showToast('הקלידו טקסט קודם');return}
  const t=new fabric.Textbox(val,{
    left:CW/2,top:CH-80,originX:'center',
    fontSize:parseInt(document.getElementById('fontSize').value)||32,
    fill:document.getElementById('textColor').value,
    fontFamily:selFont,
    textAlign:'center',direction:'rtl',width:300,
    name:'caption',
    shadow:new fabric.Shadow({color:'rgba(0,0,0,.5)',blur:4,offsetX:1,offsetY:1}),
    lockUniScaling:true,
  });
  canvas.add(t);canvas.setActiveObject(t);canvas.renderAll();
  document.getElementById('textInput').value='';
  showToast('✓ כיתוב נוסף');
}

// ══════════ FILES ══════════
function handleFiles(files){
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=e=>{
      images.push({id:Date.now()+Math.random(),src:e.target.result,state:null});
      if(images.length===1){
        document.getElementById('uploadScreen').classList.add('hidden');
        document.getElementById('editorLayout').classList.remove('hidden');
        initEditor();
      }
      renderThumbs();
      switchTo(images.length-1);
    };
    reader.readAsDataURL(file);
  });
}

// ══════════ THUMBS ══════════
function renderThumbs(){
  const s=document.getElementById('thumbsStrip');s.innerHTML='';
  images.forEach((img,i)=>{
    const t=document.createElement('div');t.className='thumb'+(i===curIdx?' active':'');
    t.innerHTML=`<img src="${img.src}"><button class="rm" onclick="event.stopPropagation();rmImg(${i})">×</button>`;
    t.onclick=()=>switchTo(i);s.appendChild(t);
  });
  const a=document.createElement('div');a.className='add-thumb';a.textContent='+';
  a.onclick=()=>document.getElementById('addMoreInput').click();s.appendChild(a);
}

function rmImg(i){
  images.splice(i,1);
  if(!images.length){document.getElementById('uploadScreen').classList.remove('hidden');document.getElementById('editorLayout').classList.add('hidden');curIdx=-1}
  else switchTo(Math.min(i,images.length-1));
  renderThumbs();
}

// ══════════ STATE ══════════
function saveState(){
  if(curIdx>=0&&curIdx<images.length) images[curIdx].state=canvas.toJSON(['name']);
}

function switchTo(i){
  saveState();curIdx=i;renderThumbs();loadImg(images[i]);
}

function loadImg(d){
  canvas.clear();
  canvas.setBackgroundColor('#f0f0f0',()=>{});
  if(d.state){
    canvas.loadFromJSON(d.state,()=>{canvas.renderAll();refreshMockup()});
    return;
  }
  fabric.Image.fromURL(d.src,img=>{
    const s=Math.min((CW*.85)/img.width,(CH*.85)/img.height);
    img.set({scaleX:s,scaleY:s,left:CW/2,top:CH/2,originX:'center',originY:'center',name:'photo',lockUniScaling:true});
    canvas.add(img);
    canvas.renderAll();
    refreshMockup();
  });
}

// ══════════ TOOLBAR ══════════
function deleteSelected(){const o=canvas.getActiveObject();if(!o){showToast('בחרו אלמנט קודם');return}if(o.name==='photo'){showToast('לא ניתן למחוק את התמונה');return}canvas.remove(o);canvas.renderAll()}
function resetCanvas(){if(curIdx<0)return;images[curIdx].state=null;curFrameId=null;loadImg(images[curIdx]);document.querySelectorAll('.frame-option').forEach(x=>x.classList.remove('active'))}
function zoomIn(){const p=canvas.getObjects().find(o=>o.name==='photo');if(p){p.scaleX*=1.1;p.scaleY*=1.1;canvas.renderAll()}}
function zoomOut(){const p=canvas.getObjects().find(o=>o.name==='photo');if(p){p.scaleX*=.9;p.scaleY*=.9;canvas.renderAll()}}
function bringFwd(){const o=canvas.getActiveObject();if(o){canvas.bringForward(o);canvas.renderAll()}}
function sendBck(){const o=canvas.getActiveObject();if(o){canvas.sendBackwards(o);canvas.renderAll()}}

// ══════════ EXPORT ══════════
function exportImage(){saveState();canvas.discardActiveObject();canvas.renderAll();const d=canvas.toDataURL({format:'png',multiplier:2,quality:1});const l=document.createElement('a');l.download=`design_${curIdx+1}.png`;l.href=d;l.click();showToast('✓ התמונה יוצאה בהצלחה!')}
function finishOrder(){saveState();const c=images.filter(i=>i.state!==null).length;showToast(`סיום הזמנה — ${c} תמונות מעוצבות מוכנות!`)}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// ══════════ DRAG & DROP ══════════
document.addEventListener('DOMContentLoaded',()=>{
  const z=document.getElementById('uploadZone');
  ['dragenter','dragover'].forEach(e=>z.addEventListener(e,ev=>{ev.preventDefault();z.style.borderColor='var(--primary)'}));
  ['dragleave','drop'].forEach(e=>z.addEventListener(e,ev=>{ev.preventDefault();z.style.borderColor=''}));
  z.addEventListener('drop',ev=>{ev.preventDefault();handleFiles(ev.dataTransfer.files)});
});
